app-id: pe.nikescar.bingtray
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: bingtray
separate-locales: false

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --share=network
  - --filesystem=xdg-config/bingtray:create
  - --filesystem=xdg-pictures:rw
  - --filesystem=xdg-data/backgrounds:create
  - --system-talk-name=org.freedesktop.Accounts
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.Background
  - --device=dri

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/bingtray/cargo

modules:
  - name: bingtray
    buildsystem: simple
    build-commands:
      - cargo build --release --features=desktop --offline --verbose --manifest-path mobile/Cargo.toml
      - install -Dm755 target/release/bingtray -t /app/bin/
      - install -Dm644 pe.nikescar.bingtray.desktop -t /app/share/applications/
      - install -Dm644 pe.nikescar.bingtray.metainfo.xml -t /app/share/metainfo/
      - install -Dm644 imgs/logo.png /app/share/icons/hicolor/256x256/apps/pe.nikescar.bingtray.png
    sources:
      - type: git
        url: https://github.com/nikescar/bingtray.git
        tag: v0.0.16
        commit: c725df19ae486bd999773ef3a443a0b6a48884a3
      - cargo-sources.json
      - type: file
        path: pe.nikescar.bingtray.desktop
      - type: file
        path: pe.nikescar.bingtray.metainfo.xml